name: Build DMG

on:
  push:
    branches: [ feat/agent-skill-modular ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.2'
    
    - name: Build Release
      run: |
        cd mac-app/MacAssistant
        xcodebuild -project MacAssistant.xcodeproj \
          -scheme MacAssistant \
          -configuration Release \
          -derivedDataPath ~/DerivedData \
          build
    
    - name: Create DMG
      run: |
        mkdir -p releases
        hdiutil create -volname "MacAssistant" \
          -srcfolder ~/DerivedData/Build/Products/Release/MacAssistant.app \
          -ov -format UDZO \
          releases/MacAssistant-v1.0.0.dmg
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MacAssistant-v1.0.0
        path: releases/MacAssistant-v1.0.0.dmg
